<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Canvas ─────────────────────────────────────────── -->
  <canvas id="pc-canvas"></canvas>

  <!-- ── Fake captcha overlay ───────────────────────────── -->
  <div id="pc-captcha">
    <div class="pc-captcha-box">
      <h2>HUMAN VERIFICATION</h2>
      <p>Select the tiles that contain a <strong>musical note</strong> to continue.</p>
      <div class="pc-captcha-puzzle" id="pc-puzzle">
        <!-- tiles injected by inline script below -->
      </div>
      <button id="pc-captcha-btn">VERIFY &amp; CONTINUE</button>
    </div>
  </div>

  <!-- ── Carousel UI (hidden until captcha solved) ──────── -->
  <div id="pc-ui" style="display:none">
    <div id="pc-platform-label"></div>

    <a id="pc-link" href="#" target="_blank" rel="noopener noreferrer"
       style="display:none">Visit</a>

    <div class="pc-bottom">
      <!-- Dot indicators generated by script -->
      <div class="pc-dots" id="pc-dots"></div>
      <div class="pc-arrows">
        <button class="pc-arrow" id="pc-prev" aria-label="Previous">&#8592;</button>
        <button class="pc-arrow" id="pc-next" aria-label="Next">&#8594;</button>
      </div>
    </div>
  </div>

  <!-- ── Drop hint overlay ──────────────────────────────── -->
  <div id="pc-drop-msg">Drop an image to particulate it</div>

  <!-- ── Hint bar ───────────────────────────────────────── -->
  <div id="pc-hint">Swipe · Drag · Arrow keys &nbsp;|&nbsp; Drop an image to load it</div>

  <script>
    // ── Build fake captcha puzzle tiles ──
    (function () {
      const emojis = ['🎵', '🎸', '🎹', '🎤', '🎵', '🥁', '🎷', '🎻', '🎵'];
      const puzzle = document.getElementById('pc-puzzle');
      emojis.forEach(function (em, i) {
        const tile = document.createElement('div');
        tile.className = 'pc-puzzle-tile';
        tile.textContent = em;
        tile.dataset.index = i;
        tile.addEventListener('click', function () {
          tile.classList.toggle('selected');
        });
        puzzle.appendChild(tile);
      });
    })();

    // ── Build carousel dot indicators ──
    (function () {
      const PLATFORMS = ['SPOTIFY', 'APPLE MUSIC', 'TIKTOK', 'YOUTUBE', 'GALLERY'];
      const dots = document.getElementById('pc-dots');
      PLATFORMS.forEach(function (_, i) {
        const dot = document.createElement('div');
        dot.className = 'pc-dot' + (i === 0 ? ' active' : '');
        dots.appendChild(dot);
      });
    })();

    // ── Drag-and-drop body class for overlay ──
    document.addEventListener('dragenter', function () {
      document.body.classList.add('dragging');
    });
    document.addEventListener('dragleave', function (e) {
      if (!e.relatedTarget) document.body.classList.remove('dragging');
    });
    document.addEventListener('drop', function () {
      document.body.classList.remove('dragging');
    });
  </script>

  <script src="particlecarousel.js"></script>
</body>
</html>
